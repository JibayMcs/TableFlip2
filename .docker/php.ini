; TableFlip — production PHP tuning.

; Opcache : keep timestamps frozen in prod (immutable build = no recheck).
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.save_comments = 1

; JIT — tracing mode, 100MB buffer.
opcache.jit = tracing
opcache.jit_buffer_size = 100M

; Long-running queries / large exports.
memory_limit = 512M
max_execution_time = 600

; Upload limits — generous for SQL imports / file exports.
post_max_size = 256M
upload_max_filesize = 256M

; Date / locale.
date.timezone = UTC

; Errors are logged, never displayed (the Laravel handler does the rendering).
display_errors = Off
log_errors = On
