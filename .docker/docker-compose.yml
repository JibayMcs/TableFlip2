# TableFlip — production compose for Dokploy / Traefik setups.
#
# Modeled on the Cerise stack which runs reliably on the same Dokploy
# server : the project's *default* network IS dokploy-network (no per-
# project _default network is created), so Traefik picks the container up
# from the right network at discovery time.
#
# Stack :
#   - app       : Apache + mod_php serving on :80 behind Traefik
#   - worker    : queue:work (exports, async jobs)
#   - scheduler : schedule:work (cleanup-exports daily)
#   - redis     : queue + cache + sessions (hot paths off SQLite)
#
# Storage = SQLite by default (one file in the `app-storage` volume).
# Switch to MariaDB/Postgres by editing .env.docker — see .docker/README.md.

x-app-image: &app-image
  image: tableflip:latest
  build:
    context: ..
    dockerfile: .docker/Dockerfile

x-app-env: &app-env
  APP_ENV: production
  APP_DEBUG: "false"
  APP_KEY: ${APP_KEY}
  APP_URL: ${APP_URL}
  APP_TIMEZONE: ${APP_TIMEZONE:-UTC}
  LOG_CHANNEL: stderr
  DB_CONNECTION: ${DB_CONNECTION:-sqlite}
  DB_DATABASE: ${DB_DATABASE:-/var/www/html/storage/app/tableflip.sqlite}
  # Remote-DB vars are only read when DB_CONNECTION ≠ sqlite — safe to
  # leave unset for the default SQLite mode.
  DB_HOST: ${DB_HOST:-}
  DB_PORT: ${DB_PORT:-}
  DB_USERNAME: ${DB_USERNAME:-}
  DB_PASSWORD: ${DB_PASSWORD:-}
  CACHE_STORE: ${CACHE_STORE:-redis}
  SESSION_DRIVER: ${SESSION_DRIVER:-redis}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  MAIL_MAILER: ${MAIL_MAILER:-log}
  MAIL_HOST: ${MAIL_HOST:-}
  MAIL_PORT: ${MAIL_PORT:-}
  MAIL_USERNAME: ${MAIL_USERNAME:-}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}
  MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-TableFlip}
  # --- Auth toggles (PMA-style lockdown) ---
  AUTH_BREEZE_ENABLED: ${AUTH_BREEZE_ENABLED:-true}
  AUTH_DIRECT_DB_ENABLED: ${AUTH_DIRECT_DB_ENABLED:-true}
  AUTH_REGISTRATION_ENABLED: ${AUTH_REGISTRATION_ENABLED:-false}
  TABLEFLIP_REQUIRE_DB_NAME: ${TABLEFLIP_REQUIRE_DB_NAME:-false}
  TABLEFLIP_ALLOWED_DB_HOSTS: ${TABLEFLIP_ALLOWED_DB_HOSTS:-}
  TABLEFLIP_ALLOWED_DB_DRIVERS: ${TABLEFLIP_ALLOWED_DB_DRIVERS:-}
  TABLEFLIP_ALLOWED_DB_NAMES: ${TABLEFLIP_ALLOWED_DB_NAMES:-}
  # --- Audit / editing ---
  TABLEFLIP_AUDIT_LOG_ENABLED: ${TABLEFLIP_AUDIT_LOG_ENABLED:-true}
  TABLEFLIP_BULK_OP_CONFIRM_THRESHOLD: ${TABLEFLIP_BULK_OP_CONFIRM_THRESHOLD:-10}
  # --- Exports ---
  TABLEFLIP_EXPORTS_DISK: local
  TABLEFLIP_EXPORTS_RETENTION_DAYS: ${TABLEFLIP_EXPORTS_RETENTION_DAYS:-7}
  TABLEFLIP_EXPORTS_DOWNLOAD_TTL: ${TABLEFLIP_EXPORTS_DOWNLOAD_TTL:-30}

services:
  app:
    <<: *app-image
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
    volumes:
      - app-storage:/var/www/html/storage
    expose:
      - "80"
    # Traefik labels are typically generated by Dokploy from the Domain UI.
    networks:
      - dokploy-network
      - default

  worker:
    <<: *app-image
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: ["php", "artisan", "queue:work", "--tries=1", "--timeout=600", "--sleep=3"]
    environment:
      <<: *app-env
      MIGRATE_ON_BOOT: "0"
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - dokploy-network
      - default

  scheduler:
    <<: *app-image
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: ["php", "artisan", "schedule:work"]
    environment:
      <<: *app-env
      MIGRATE_ON_BOOT: "0"
    volumes:
      - app-storage:/var/www/html/storage
    networks:
      - dokploy-network
      - default

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--requirepass"
      - "${REDIS_PASSWORD:-}"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - dokploy-network
      - default

volumes:
  app-storage:
  redis-data:

# Both `default` and `dokploy-network` point at the same external network.
# Every service declares `networks: [dokploy-network, default]` so they
# all land on dokploy-network — required because Dokploy auto-injects
# dokploy-network on services with Traefik labels but NOT on Redis, which
# otherwise ends up on a per-project network and becomes unreachable.
# This is the exact pattern Cerise uses on the same Dokploy server.
networks:
  default:
    external: true
    name: dokploy-network
  dokploy-network:
    external: true
