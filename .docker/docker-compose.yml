# TableFlip — production compose for Dokploy / Traefik setups.
#
# Stack :
#   - app       : FrankenPHP serving on :8080 behind your reverse proxy
#   - worker    : queue:work (exports, async jobs)
#   - scheduler : schedule:work (cleanup-exports daily)
#   - redis     : queue + cache + sessions (Redis = hot paths, SQLite =
#                 cool storage). 64 MB RAM, persisted via appendonly.
#
# Storage = SQLite by default (one file in the `app-storage` volume), so
# you don't have to run a separate MariaDB/Postgres just for TableFlip.
# Switch to a managed DB by editing .env.docker — see .docker/README.md.
#
# To run it under Dokploy : import this file as a "Compose" application,
# fill the env vars from .env.docker.example, and add Traefik labels via
# the Dokploy UI (host / certResolver / etc.).
#
# To run it locally (testing the image) :
#   cp .docker/.env.docker.example .env.docker
#   docker compose -f .docker/docker-compose.yml --env-file .env.docker up

x-app-env: &app-env
  APP_ENV: production
  APP_DEBUG: "false"
  APP_KEY: ${APP_KEY}
  APP_URL: ${APP_URL}
  APP_TIMEZONE: ${APP_TIMEZONE:-UTC}
  LOG_CHANNEL: stderr
  DB_CONNECTION: ${DB_CONNECTION:-sqlite}
  DB_DATABASE: ${DB_DATABASE:-/app/storage/app/tableflip.sqlite}
  # The remote-DB vars below are only read when DB_CONNECTION ≠ sqlite —
  # safe to leave unset for the default SQLite mode.
  DB_HOST: ${DB_HOST:-}
  DB_PORT: ${DB_PORT:-}
  DB_USERNAME: ${DB_USERNAME:-}
  DB_PASSWORD: ${DB_PASSWORD:-}
  CACHE_STORE: ${CACHE_STORE:-redis}
  SESSION_DRIVER: ${SESSION_DRIVER:-redis}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  MAIL_MAILER: ${MAIL_MAILER:-log}
  TABLEFLIP_EXPORTS_DISK: local
  TABLEFLIP_EXPORTS_RETENTION_DAYS: ${TABLEFLIP_EXPORTS_RETENTION_DAYS:-7}

services:
  app:
    image: tableflip:latest
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
    volumes:
      - app-storage:/app/storage
    expose:
      - "8080"
    # Sample Traefik labels — Dokploy will usually generate these for you.
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.tableflip.rule=Host(`tableflip.example.com`)"
    #   - "traefik.http.routers.tableflip.entrypoints=websecure"
    #   - "traefik.http.routers.tableflip.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.tableflip.loadbalancer.server.port=8080"

  worker:
    image: tableflip:latest
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: ["php", "artisan", "queue:work", "--tries=1", "--timeout=600", "--sleep=3"]
    environment:
      <<: *app-env
      MIGRATE_ON_BOOT: "0"
    volumes:
      - app-storage:/app/storage

  scheduler:
    image: tableflip:latest
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: ["php", "artisan", "schedule:work"]
    environment:
      <<: *app-env
      MIGRATE_ON_BOOT: "0"
    volumes:
      - app-storage:/app/storage

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--requirepass"
      - "${REDIS_PASSWORD:-}"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

volumes:
  app-storage:
  redis-data:
